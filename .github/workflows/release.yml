name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ir.exe
            asset_name: ir-windows.zip
          - os: ubuntu-latest
            artifact_name: ir
            asset_name: ir-linux.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package executable (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/release/ir.exe -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Package executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.asset_name }} -C target/release ir

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
